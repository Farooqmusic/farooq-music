# Codemagic build configuration — Farooq Music (iOS)
# Automatic App Store signing: Codemagic creates the certificate and
# provisioning profile for com.farooqmusic.app if they don't exist yet,
# using the "Farooq Music" API key and the CERTIFICATE_PRIVATE_KEY secret.

workflows:
  ios-farooq-music:
    name: Farooq Music iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Farooq Music
    environment:
      groups:
        - farooq_signing      # must contain CERTIFICATE_PRIVATE_KEY (secret)
      vars:
        BUNDLE_ID: "com.farooqmusic.app"
      flutter: stable
      xcode: latest
    scripts:
      - name: Set correct bundle identifier
        script: |
          sed -i '' 's/com\.example\.farooqMusic/com.farooqmusic.app/g' \
            ios/Runner.xcodeproj/project.pbxproj
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Create / fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add certificate to keychain
        script: |
          keychain add-certificates
      - name: Apply signing to Xcode project
        script: |
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
