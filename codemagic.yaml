# Codemagic build configuration — Farooq Music (iOS)
# Automatic App Store signing. The signing key is stored as a single-line
# base64 secret (CERTIFICATE_PRIVATE_KEY) and decoded during the build.

workflows:
  ios-farooq-music:
    name: Farooq Music iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Farooq Music
    environment:
      groups:
        - farooq_signing      # must contain CERTIFICATE_PRIVATE_KEY (secret, base64)
      vars:
        BUNDLE_ID: "com.farooqmusic.app"
      flutter: stable
      xcode: latest
    scripts:
      - name: Set correct bundle identifier
        script: |
          sed -i '' 's/com\.example\.farooqMusic/com.farooqmusic.app/g' \
            ios/Runner.xcodeproj/project.pbxproj
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Create / fetch signing files
        script: |
          printf '%s' "$CERTIFICATE_PRIVATE_KEY" | openssl base64 -A -d > /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
      - name: Add certificate to keychain
        script: |
          keychain add-certificates
      - name: Apply signing to Xcode project
        script: |
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
