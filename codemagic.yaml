# Codemagic build configuration — Farooq Music (iOS)
# Builds a signed App Store .ipa and uploads it to TestFlight.

workflows:
  ios-farooq-music:
    name: Farooq Music iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Farooq Music
    environment:
      groups:
        - farooq_signing          # contains CERTIFICATE_PRIVATE_KEY (secret, base64)
      vars:
        BUNDLE_ID: "com.farooqmusic.app"
        APP_STORE_APPLE_ID: 6784953057
      flutter: stable
      xcode: latest
    scripts:
      - name: Set correct bundle identifier
        script: |
          sed -i '' 's/com\.example\.farooqMusic/com.farooqmusic.app/g' \
            ios/Runner.xcodeproj/project.pbxproj
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Create / fetch signing files
        script: |
          printf '%s' "$CERTIFICATE_PRIVATE_KEY" | openssl base64 -A -d > /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
      - name: Add certificate to keychain
        script: |
          keychain add-certificates
      - name: Apply signing to Xcode project
        script: |
          xcode-project use-profiles
      - name: Set build number (one higher than latest on TestFlight)
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          NEXT=$(( ${LATEST:-0} + 1 ))
          echo "Using build number: $NEXT"
          cd ios && agvtool new-version -all "$NEXT" && cd ..
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
